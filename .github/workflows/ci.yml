name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        config: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DADASDF_CL_BUILD_EXAMPLES=ON
          -DADASDF_CL_BUILD_TESTS=ON
          -DADASDF_CL_USE_EXISTING_CORE=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure

      - name: Clean repo check
        run: python scripts/check_repo_clean.py .
